services:
  heyform:
    image: ${HEYFORM_IMAGE:-heyform/community-edition:latest}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      keydb:
        condition: service_healthy
    ports:
      - "${HEYFORM_HOST_PORT:-9513}:8000"
    environment:
      APP_HOMEPAGE_URL: ${APP_HOMEPAGE_URL:-http://127.0.0.1:9513}
      APP_LISTEN_HOSTNAME: 0.0.0.0
      APP_LISTEN_PORT: 8000
      SESSION_KEY: ${SESSION_KEY:-change-this-session-key}
      FORM_ENCRYPTION_KEY: ${FORM_ENCRYPTION_KEY:-change-this-form-key}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/heyform}
      REDIS_HOST: ${REDIS_HOST:-keydb}
      REDIS_PORT: ${REDIS_PORT:-6379}
      APP_DISABLE_REGISTRATION: ${APP_DISABLE_REGISTRATION:-false}
      SMTP_FROM: ${SMTP_FROM:-heyform@test.local}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_IGNORE_CERT: ${SMTP_IGNORE_CERT:-false}
    volumes:
      - heyform_uploads:/app/static/upload
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongo:
    image: ${MONGO_IMAGE:-percona/percona-server-mongodb:4.4}
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongo --quiet 127.0.0.1/admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  keydb:
    image: ${KEYDB_IMAGE:-eqalpha/keydb:latest}
    restart: unless-stopped
    command: keydb-server --appendonly yes --protected-mode no
    volumes:
      - keydb_data:/data
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:latest}
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_HOST_PORT:-8025}:8025"

volumes:
  heyform_uploads:
  mongodb_data:
  keydb_data:
